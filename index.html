<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pencil Draw">
<meta name="theme-color" content="#1a1714">
<title>Pencil Draw</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

:root {
  --bg: #181715;
  --surface: #222019;
  --panel: #2a2825;
  --border: #3a3835;
  --text: #f0ece6;
  --text-muted: #8a8680;
  --accent: #e8a456;
  --danger: #c94a2a;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --toolbar-h: 58px;
  --layers-w: 200px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }

html, body {
  width:100%; height:100%;
  background:var(--bg);
  font-family:'DM Sans', sans-serif;
  overflow:hidden;
  touch-action:none;
  color:var(--text);
}

/* ── TOOLBAR ── */
#toolbar {
  position:fixed; top:0; left:0; right:0;
  height:calc(var(--toolbar-h) + var(--safe-top));
  padding-top:var(--safe-top);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  padding-left:14px; padding-right:14px;
  z-index:200;
}

.logo {
  font-family:'DM Mono', monospace;
  font-size:12px; font-weight:500; letter-spacing:.1em;
  color:var(--accent); white-space:nowrap; margin-right:4px;
}

.sep { width:1px; height:26px; background:var(--border); flex-shrink:0; }

.swatches { display:flex; gap:5px; align-items:center; }
.sw {
  width:20px; height:20px; border-radius:50%;
  border:2px solid transparent; cursor:pointer;
  transition:transform .12s, border-color .12s; flex-shrink:0;
}
.sw:hover { transform:scale(1.15); }
.sw.active { border-color:var(--accent) !important; transform:scale(1.22); }

#cp {
  width:20px; height:20px; border-radius:50%;
  border:2px dashed var(--text-muted);
  cursor:pointer; background:none; padding:0; overflow:hidden;
}
#cp::-webkit-color-swatch-wrapper { padding:0; border-radius:50%; }
#cp::-webkit-color-swatch { border:none; border-radius:50%; }

.ctrl { display:flex; align-items:center; gap:6px; }
.ctrl-lbl { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-muted); white-space:nowrap; }
input[type=range] {
  -webkit-appearance:none; appearance:none;
  height:3px; background:var(--border); border-radius:2px; outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:13px; height:13px; border-radius:50%;
  background:var(--text); cursor:pointer;
}
#sizeSlider { width:70px; }
#opSlider   { width:55px; }

.tbtn {
  height:30px; padding:0 11px; border-radius:7px;
  border:1px solid var(--border); background:transparent;
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:400;
  color:var(--text-muted); cursor:pointer; transition:all .13s; white-space:nowrap;
}
.tbtn:hover  { background:var(--panel); color:var(--text); }
.tbtn.active { background:var(--accent); color:#1a1714; border-color:var(--accent); font-weight:500; }
.tbtn.danger:hover { background:var(--danger); border-color:var(--danger); color:#fff; }

#undoBtn { margin-left:auto; }
#layersToggle { font-family:'DM Mono',monospace; font-size:11px; }

/* ── MAIN AREA ── */
#main {
  position:fixed;
  top:calc(var(--toolbar-h) + var(--safe-top));
  left:0; right:0;
  bottom:calc(var(--toolbar-h) + var(--safe-bottom));
  display:flex;
}

/* ── CANVAS STAGE ── */
#stage {
  flex:1; position:relative; overflow:hidden;
  background: repeating-conic-gradient(#252320 0% 25%, #1e1d1b 0% 50%) 0 0 / 20px 20px;
}

#stage canvas {
  position:absolute; top:0; left:0;
  touch-action:none;
}

/* ── LAYERS PANEL ── */
#layersPanel {
  width:var(--layers-w);
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  transition:width .2s ease, opacity .2s ease;
  overflow:hidden;
}
#layersPanel.hidden { width:0; opacity:0; pointer-events:none; }

.layers-header {
  padding:10px 12px 8px;
  font-family:'DM Mono',monospace; font-size:11px; font-weight:500;
  color:var(--text-muted); letter-spacing:.08em;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.add-layer-btn {
  width:22px; height:22px; border-radius:5px;
  border:1px solid var(--border); background:transparent;
  color:var(--text-muted); cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center; line-height:1;
  transition:all .13s;
}
.add-layer-btn:hover { background:var(--panel); color:var(--accent); }

#layersList { flex:1; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:4px; }

.layer-item {
  display:flex; align-items:center; gap:7px;
  padding:7px 8px; border-radius:7px;
  border:1px solid transparent;
  cursor:pointer; transition:all .13s;
}
.layer-item:hover { background:var(--panel); }
.layer-item.active { background:var(--panel); border-color:var(--border); }
.layer-item.active .layer-name { color:var(--accent); }

.vis-btn {
  width:18px; height:18px; flex-shrink:0;
  background:none; border:none; cursor:pointer;
  font-size:13px; opacity:0.7; transition:opacity .13s;
  display:flex; align-items:center; justify-content:center;
}
.vis-btn:hover { opacity:1; }
.vis-btn.hidden-lyr { opacity:0.25; }

.layer-thumb {
  width:32px; height:32px; border-radius:4px;
  border:1px solid var(--border); flex-shrink:0;
  background:repeating-conic-gradient(#333 0% 25%, #2a2a2a 0% 50%) 0 0 / 8px 8px;
  overflow:hidden; position:relative;
}
.layer-thumb canvas { position:absolute; top:0; left:0; width:100%; height:100%; }

.layer-name {
  flex:1; font-size:12px; color:var(--text);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

.del-layer-btn {
  width:18px; height:18px; flex-shrink:0;
  background:none; border:none; cursor:pointer;
  font-size:12px; color:var(--text-muted); opacity:0;
  transition:opacity .13s;
}
.layer-item:hover .del-layer-btn { opacity:0.5; }
.del-layer-btn:hover { opacity:1 !important; color:var(--danger); }

/* ── BOTTOM BAR ── */
#bottomBar {
  position:fixed; bottom:0; left:0; right:0;
  height:calc(var(--toolbar-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  padding-left:14px; padding-right:14px;
  z-index:200;
}

.export-hint { font-size:11px; color:var(--text-muted); margin-left:auto; }

/* ── MODALS / TOASTS ── */
#toast {
  position:fixed; bottom:calc(var(--toolbar-h) + var(--safe-bottom) + 12px); left:50%; transform:translateX(-50%) translateY(20px);
  background:var(--panel); border:1px solid var(--border); border-radius:8px;
  padding:8px 16px; font-size:13px; color:var(--text);
  opacity:0; transition:all .25s; z-index:999; pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* install banner */
#installBanner {
  position:fixed; top:calc(var(--toolbar-h) + var(--safe-top) + 8px); left:50%; transform:translateX(-50%);
  background:#1a3a2a; border:1px solid #2a6a4a; border-radius:10px;
  padding:10px 16px; font-size:12px; color:#7ecba5; max-width:320px; text-align:center;
  z-index:300; line-height:1.5;
}
#installBanner button { margin-top:6px; background:none; border:none; color:#7ecba5; font-size:11px; cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <span class="logo">P·DRAW</span>
  <div class="sep"></div>
  <div class="swatches">
    <div class="sw active" data-c="#f0ece6" style="background:#f0ece6"></div>
    <div class="sw" data-c="#c94a2a" style="background:#c94a2a"></div>
    <div class="sw" data-c="#5b9bd5" style="background:#5b9bd5"></div>
    <div class="sw" data-c="#5cb87a" style="background:#5cb87a"></div>
    <div class="sw" data-c="#e8c84b" style="background:#e8c84b"></div>
    <div class="sw" data-c="#c47ed4" style="background:#c47ed4"></div>
    <div class="sw" data-c="#e8a456" style="background:#e8a456"></div>
    <input type="color" id="cp" value="#f0ece6" title="Custom">
  </div>
  <div class="sep"></div>
  <div class="ctrl">
    <span class="ctrl-lbl">SIZE</span>
    <input type="range" id="sizeSlider" min="1" max="60" value="4" step="1">
    <span class="ctrl-lbl" id="sizeVal">4</span>
  </div>
  <div class="sep"></div>
  <div class="ctrl">
    <span class="ctrl-lbl">OPACITY</span>
    <input type="range" id="opSlider" min="5" max="100" value="100" step="1">
  </div>
  <div class="sep"></div>
  <button class="tbtn active" id="penBtn">Pen</button>
  <button class="tbtn" id="eraserBtn">Eraser</button>
  <button class="tbtn" id="undoBtn">Undo</button>
  <div class="sep"></div>
  <button class="tbtn" id="layersToggle">Layers</button>
</div>

<!-- MAIN -->
<div id="main">
  <div id="stage"></div>
  <div id="layersPanel">
    <div class="layers-header">
      <span>LAYERS</span>
      <button class="add-layer-btn" id="addLayerBtn" title="Add draw layer">+</button>
    </div>
    <div id="layersList"></div>
  </div>
</div>

<!-- BOTTOM BAR -->
<div id="bottomBar">
  <button class="tbtn" id="addPhotoBtn">+ Photo</button>
  <button class="tbtn" id="addDrawBtn">+ Draw Layer</button>
  <div class="sep"></div>
  <button class="tbtn" id="exportAllBtn">Export All</button>
  <button class="tbtn" id="exportVisBtn">Export Visible</button>
  <span class="export-hint">tap visible layers → export</span>
</div>

<!-- hidden file input -->
<input type="file" id="photoInput" accept="image/*" style="display:none">

<!-- toast -->
<div id="toast"></div>

<!-- install banner -->
<div id="installBanner" id="installBanner" style="display:none">
  To install: tap the <strong>Share</strong> button in Safari, then <strong>"Add to Home Screen"</strong>.
  <br><button onclick="document.getElementById('installBanner').style.display='none'">Dismiss</button>
</div>

<script>
(() => {
'use strict';

/* ══════════════════════════════════════════════
   STATE
══════════════════════════════════════════════ */
let layers = [];       // [{id, type:'draw'|'photo', name, visible, canvas, ctx, image?, paths[], undoStack[]}]
let activeLayerId = null;
let color = '#f0ece6';
let baseSize = 4;
let opacity = 1.0;
let mode = 'pen';      // 'pen'|'eraser'
let drawing = false;
let lastX = 0, lastY = 0;
let layersPanelVisible = true;
let idCounter = 0;

const stage = document.getElementById('stage');

/* ══════════════════════════════════════════════
   RESIZE
══════════════════════════════════════════════ */
function stageSize() {
  return { w: stage.offsetWidth, h: stage.offsetHeight };
}

function resizeAll() {
  const { w, h } = stageSize();
  const dpr = window.devicePixelRatio || 1;
  for (const L of layers) {
    if (L.type === 'draw') {
      // preserve pixels
      const tmp = document.createElement('canvas');
      tmp.width = L.canvas.width; tmp.height = L.canvas.height;
      tmp.getContext('2d').drawImage(L.canvas, 0, 0);
      L.canvas.style.width = w + 'px'; L.canvas.style.height = h + 'px';
      L.canvas.width = w * dpr; L.canvas.height = h * dpr;
      L.ctx = L.canvas.getContext('2d');
      L.ctx.scale(dpr, dpr);
      L.ctx.drawImage(tmp, 0, 0, w, h);
    } else {
      L.canvas.style.width = w + 'px'; L.canvas.style.height = h + 'px';
      L.canvas.width = w * dpr; L.canvas.height = h * dpr;
      L.ctx = L.canvas.getContext('2d');
      L.ctx.scale(dpr, dpr);
      drawPhotoToCanvas(L);
    }
  }
  updateThumbs();
}

window.addEventListener('resize', resizeAll);

/* ══════════════════════════════════════════════
   LAYER CREATION
══════════════════════════════════════════════ */
function makeCanvas() {
  const { w, h } = stageSize();
  const dpr = window.devicePixelRatio || 1;
  const c = document.createElement('canvas');
  c.style.position = 'absolute'; c.style.top = '0'; c.style.left = '0';
  c.style.width = w + 'px'; c.style.height = h + 'px';
  c.width = w * dpr; c.height = h * dpr;
  const ctx = c.getContext('2d');
  ctx.scale(dpr, dpr);
  return { c, ctx };
}

function addDrawLayer(name) {
  const { c, ctx } = makeCanvas();
  c.style.touchAction = 'none';
  const id = ++idCounter;
  const L = { id, type:'draw', name: name || `Draw ${id}`, visible:true, canvas:c, ctx, paths:[], undoStack:[] };
  layers.push(L);
  stage.appendChild(c);
  setActive(id);
  renderLayersList();
  return L;
}

function addPhotoLayer(name, img) {
  const { c, ctx } = makeCanvas();
  c.style.pointerEvents = 'none';
  const id = ++idCounter;
  const L = { id, type:'photo', name: name || `Photo ${id}`, visible:true, canvas:c, ctx, image:img };
  layers.unshift(L);  // photos go below draw layers
  stage.insertBefore(c, stage.firstChild);
  drawPhotoToCanvas(L);
  renderLayersList();
  updateZOrder();
  return L;
}

function drawPhotoToCanvas(L) {
  if (!L.image) return;
  const { w, h } = stageSize();
  L.ctx.clearRect(0, 0, w, h);
  // fit-contain
  const iw = L.image.naturalWidth, ih = L.image.naturalHeight;
  const scale = Math.min(w / iw, h / ih);
  const sw = iw * scale, sh = ih * scale;
  const ox = (w - sw) / 2, oy = (h - sh) / 2;
  L.ctx.drawImage(L.image, ox, oy, sw, sh);
}

function updateZOrder() {
  // photos first, then draws, in layers[] order
  layers.forEach(L => stage.appendChild(L.canvas));
}

/* ══════════════════════════════════════════════
   VISIBILITY & ACTIVE
══════════════════════════════════════════════ */
function setActive(id) {
  activeLayerId = id;
  // only draw layers get pointer events
  for (const L of layers) {
    if (L.type === 'draw') {
      L.canvas.style.zIndex = L.id === id ? 10 : 5;
    } else {
      L.canvas.style.zIndex = 1;
    }
  }
  renderLayersList();
}

function activeLayer() { return layers.find(l => l.id === activeLayerId); }

function toggleVisible(id) {
  const L = layers.find(l => l.id === id);
  if (!L) return;
  L.visible = !L.visible;
  L.canvas.style.opacity = L.visible ? '1' : '0';
  renderLayersList();
}

function deleteLayer(id) {
  const idx = layers.findIndex(l => l.id === id);
  if (idx === -1) return;
  stage.removeChild(layers[idx].canvas);
  layers.splice(idx, 1);
  if (activeLayerId === id) {
    const dl = layers.filter(l => l.type === 'draw');
    setActive(dl.length ? dl[dl.length-1].id : null);
  }
  renderLayersList();
}

/* ══════════════════════════════════════════════
   DRAWING
══════════════════════════════════════════════ */
function toRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

function getPos(e) {
  const r = stage.getBoundingClientRect();
  if (e.changedTouches) {
    const t = e.changedTouches[0];
    return { x: t.clientX - r.left, y: t.clientY - r.top, pr: t.force > 0 ? t.force : 0.5 };
  }
  return { x: e.clientX - r.left, y: e.clientY - r.top, pr: e.pressure > 0 ? e.pressure : 0.5 };
}

function startDraw(e) {
  const L = activeLayer();
  if (!L || L.type !== 'draw' || !L.visible) return;
  e.preventDefault();
  drawing = true;
  const p = getPos(e);
  lastX = p.x; lastY = p.y;
  // snapshot for undo
  const dpr = window.devicePixelRatio || 1;
  const snap = document.createElement('canvas');
  snap.width = L.canvas.width; snap.height = L.canvas.height;
  snap.getContext('2d').drawImage(L.canvas, 0, 0);
  L.undoStack.push(snap);
  if (L.undoStack.length > 30) L.undoStack.shift();
}

function moveDraw(e) {
  if (!drawing) return;
  e.preventDefault();
  const L = activeLayer();
  if (!L || L.type !== 'draw') return;
  const p = getPos(e);
  const pr = p.pr;
  L.ctx.save();
  L.ctx.lineCap = 'round'; L.ctx.lineJoin = 'round';
  if (mode === 'eraser') {
    L.ctx.globalCompositeOperation = 'destination-out';
    L.ctx.strokeStyle = 'rgba(0,0,0,1)';
    L.ctx.lineWidth = baseSize * pr * 2.5;
  } else {
    L.ctx.globalCompositeOperation = 'source-over';
    L.ctx.strokeStyle = toRgba(color, opacity);
    L.ctx.lineWidth = baseSize * pr * 2;
  }
  L.ctx.beginPath();
  L.ctx.moveTo(lastX, lastY);
  L.ctx.lineTo(p.x, p.y);
  L.ctx.stroke();
  L.ctx.restore();
  lastX = p.x; lastY = p.y;
}

function endDraw() {
  drawing = false;
  updateThumbs();
}

// Route pointer/touch events from stage to active draw canvas logic
stage.addEventListener('pointerdown', startDraw, { passive: false });
stage.addEventListener('pointermove', moveDraw,  { passive: false });
stage.addEventListener('pointerup',   endDraw);
stage.addEventListener('pointercancel', endDraw);
stage.addEventListener('touchstart', startDraw, { passive: false });
stage.addEventListener('touchmove',  moveDraw,  { passive: false });
stage.addEventListener('touchend',   endDraw);

/* ══════════════════════════════════════════════
   UNDO
══════════════════════════════════════════════ */
function undo() {
  const L = activeLayer();
  if (!L || L.type !== 'draw' || !L.undoStack.length) { toast('Nothing to undo'); return; }
  const snap = L.undoStack.pop();
  const { w, h } = stageSize();
  L.ctx.clearRect(0, 0, w, h);
  L.ctx.drawImage(snap, 0, 0, w, h);
  updateThumbs();
}

/* ══════════════════════════════════════════════
   LAYER THUMBNAILS
══════════════════════════════════════════════ */
function updateThumbs() {
  layers.forEach(L => {
    const el = document.querySelector(`.layer-thumb[data-id="${L.id}"] canvas`);
    if (!el) return;
    el.getContext('2d').drawImage(L.canvas, 0, 0, el.width, el.height);
  });
}

/* ══════════════════════════════════════════════
   LAYERS LIST UI
══════════════════════════════════════════════ */
function renderLayersList() {
  const list = document.getElementById('layersList');
  list.innerHTML = '';
  // render top-to-bottom = last layer first visually
  const reversed = [...layers].reverse();
  reversed.forEach(L => {
    const item = document.createElement('div');
    item.className = 'layer-item' + (L.id === activeLayerId ? ' active' : '');
    item.dataset.id = L.id;

    // visibility button
    const visBtn = document.createElement('button');
    visBtn.className = 'vis-btn' + (L.visible ? '' : ' hidden-lyr');
    visBtn.textContent = L.visible ? '👁' : '◻';
    visBtn.title = L.visible ? 'Hide' : 'Show';
    visBtn.addEventListener('click', e => { e.stopPropagation(); toggleVisible(L.id); });

    // thumbnail
    const thumb = document.createElement('div');
    thumb.className = 'layer-thumb'; thumb.dataset.id = L.id;
    const tc = document.createElement('canvas');
    tc.width = 32; tc.height = 32;
    tc.getContext('2d').drawImage(L.canvas, 0, 0, 32, 32);
    thumb.appendChild(tc);

    // name
    const nameEl = document.createElement('div');
    nameEl.className = 'layer-name';
    nameEl.textContent = (L.type === 'photo' ? '🖼 ' : '✏️ ') + L.name;

    // delete
    const delBtn = document.createElement('button');
    delBtn.className = 'del-layer-btn'; delBtn.textContent = '✕'; delBtn.title = 'Delete layer';
    delBtn.addEventListener('click', e => { e.stopPropagation(); if (confirm(`Delete "${L.name}"?`)) deleteLayer(L.id); });

    item.appendChild(visBtn);
    item.appendChild(thumb);
    item.appendChild(nameEl);
    item.appendChild(delBtn);
    item.addEventListener('click', () => { if (L.type === 'draw') setActive(L.id); });
    list.appendChild(item);
  });
}

/* ══════════════════════════════════════════════
   EXPORT
══════════════════════════════════════════════ */
function exportSVG(visibleOnly) {
  const { w, h } = stageSize();
  const toExport = visibleOnly ? layers.filter(l => l.visible) : layers;
  if (!toExport.length) { toast('No layers to export'); return; }

  let svg = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`;
  svg += `<rect width="${w}" height="${h}" fill="white"/>`;

  for (const L of toExport) {
    const tmp = document.createElement('canvas');
    tmp.width = w; tmp.height = h;
    const dpr = window.devicePixelRatio || 1;
    tmp.getContext('2d').drawImage(L.canvas, 0, 0, w * dpr, h * dpr, 0, 0, w, h);
    const dataUrl = tmp.toDataURL('image/png');
    svg += `<image x="0" y="0" width="${w}" height="${h}" xlink:href="${dataUrl}" opacity="${L.visible ? 1 : 0}"/>`;
  }
  svg += '</svg>';

  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = visibleOnly ? 'drawing-visible.svg' : 'drawing-all.svg';
  a.click(); URL.revokeObjectURL(url);
  toast(visibleOnly ? 'Exported visible layers' : 'Exported all layers');
}

/* ══════════════════════════════════════════════
   PHOTO IMPORT
══════════════════════════════════════════════ */
document.getElementById('photoInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => {
    addPhotoLayer(file.name.replace(/\.[^.]+$/, ''), img);
    updateZOrder();
    toast('Photo layer added');
  };
  img.src = URL.createObjectURL(file);
  e.target.value = '';
});

/* ══════════════════════════════════════════════
   UI CONTROLS
══════════════════════════════════════════════ */
document.querySelectorAll('.sw').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.sw').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    color = sw.dataset.c;
    document.getElementById('cp').value = color;
  });
});
document.getElementById('cp').addEventListener('input', e => {
  color = e.target.value;
  document.querySelectorAll('.sw').forEach(s => s.classList.remove('active'));
});

document.getElementById('sizeSlider').addEventListener('input', e => {
  baseSize = +e.target.value;
  document.getElementById('sizeVal').textContent = baseSize;
});
document.getElementById('opSlider').addEventListener('input', e => { opacity = +e.target.value / 100; });

document.getElementById('penBtn').addEventListener('click', () => {
  mode = 'pen';
  document.getElementById('penBtn').classList.add('active');
  document.getElementById('eraserBtn').classList.remove('active');
});
document.getElementById('eraserBtn').addEventListener('click', () => {
  mode = 'eraser';
  document.getElementById('eraserBtn').classList.add('active');
  document.getElementById('penBtn').classList.remove('active');
});
document.getElementById('undoBtn').addEventListener('click', undo);

document.getElementById('addLayerBtn').addEventListener('click', () => addDrawLayer());
document.getElementById('addDrawBtn').addEventListener('click', () => addDrawLayer());
document.getElementById('addPhotoBtn').addEventListener('click', () => document.getElementById('photoInput').click());

document.getElementById('exportAllBtn').addEventListener('click', () => exportSVG(false));
document.getElementById('exportVisBtn').addEventListener('click', () => exportSVG(true));

document.getElementById('layersToggle').addEventListener('click', () => {
  layersPanelVisible = !layersPanelVisible;
  document.getElementById('layersPanel').classList.toggle('hidden', !layersPanelVisible);
  document.getElementById('layersToggle').classList.toggle('active', layersPanelVisible);
});

/* ══════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════ */
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ══════════════════════════════════════════════
   PWA INSTALL HINT
══════════════════════════════════════════════ */
const isStandalone = window.navigator.standalone === true || window.matchMedia('(display-mode: standalone)').matches;
if (!isStandalone && /iPad|iPhone|iPod/.test(navigator.userAgent)) {
  const banner = document.getElementById('installBanner');
  banner.style.display = 'block';
  setTimeout(() => banner.style.display = 'none', 8000);
}

/* ══════════════════════════════════════════════
   INIT — create default layers
══════════════════════════════════════════════ */
// Wait for layout
requestAnimationFrame(() => {
  requestAnimationFrame(() => {
    addDrawLayer('Draw 1');
    document.getElementById('layersToggle').classList.add('active');
    toast('Draw with Apple Pencil · Add photo with + Photo');
  });
});

})();
</script>
</body>
</html>
