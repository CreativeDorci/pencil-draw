<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pencil Draw">
<meta name="theme-color" content="#1a1714">
<title>Pencil Draw</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --bg: #181715;
  --surface: #222019;
  --panel: #2a2825;
  --border: #3a3835;
  --text: #f0ece6;
  --text-muted: #8a8680;
  --accent: #e8a456;
  --danger: #c94a2a;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --toolbar-h: 58px;
  --layers-w: 210px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; -webkit-user-select:none; }

html, body {
  width:100%; height:100%;
  background:var(--bg);
  font-family:'DM Sans', sans-serif;
  overflow:hidden;
  touch-action:none;
  color:var(--text);
}

#toolbar {
  position:fixed; top:0; left:0; right:0;
  height:calc(var(--toolbar-h) + var(--safe-top));
  padding-top:var(--safe-top);
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  padding-left:14px; padding-right:14px;
  z-index:200; overflow-x:auto; overflow-y:hidden;
}
#toolbar::-webkit-scrollbar { display:none; }

.logo {
  font-family:'DM Mono', monospace;
  font-size:12px; font-weight:500; letter-spacing:.1em;
  color:var(--accent); white-space:nowrap; margin-right:4px; flex-shrink:0;
}
.sep { width:1px; height:26px; background:var(--border); flex-shrink:0; }

.swatches { display:flex; gap:5px; align-items:center; flex-shrink:0; }
.sw {
  width:20px; height:20px; border-radius:50%;
  border:2px solid transparent; cursor:pointer;
  transition:transform .12s, border-color .12s; flex-shrink:0;
}
.sw:hover { transform:scale(1.15); }
.sw.active { border-color:var(--accent) !important; transform:scale(1.22); }

#cp {
  width:20px; height:20px; border-radius:50%;
  border:2px dashed var(--text-muted);
  cursor:pointer; background:none; padding:0; overflow:hidden; flex-shrink:0;
}
#cp::-webkit-color-swatch-wrapper { padding:0; border-radius:50%; }
#cp::-webkit-color-swatch { border:none; border-radius:50%; }

.ctrl { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.ctrl-lbl { font-family:'DM Mono',monospace; font-size:10px; color:var(--text-muted); white-space:nowrap; }
input[type=range] {
  -webkit-appearance:none; appearance:none;
  height:3px; background:var(--border); border-radius:2px; outline:none; cursor:pointer;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance:none; width:13px; height:13px; border-radius:50%;
  background:var(--text); cursor:pointer;
}
#sizeSlider { width:70px; }

.tbtn {
  height:30px; padding:0 11px; border-radius:7px;
  border:1px solid var(--border); background:transparent;
  font-family:'DM Sans',sans-serif; font-size:12px; font-weight:400;
  color:var(--text-muted); cursor:pointer; transition:all .13s; white-space:nowrap; flex-shrink:0;
}
.tbtn:hover  { background:var(--panel); color:var(--text); }
.tbtn.active { background:var(--accent); color:#1a1714; border-color:var(--accent); font-weight:500; }
#undoBtn { margin-left:auto; }

#main {
  position:fixed;
  top:calc(var(--toolbar-h) + var(--safe-top));
  left:0; right:0;
  bottom:calc(var(--toolbar-h) + var(--safe-bottom));
  display:flex;
}

#stage {
  flex:1; position:relative; overflow:hidden;
  background: repeating-conic-gradient(#252320 0% 25%, #1e1d1b 0% 50%) 0 0 / 20px 20px;
  touch-action:none;
}

#stage canvas.photo-canvas {
  position:absolute; top:0; left:0; pointer-events:none;
}

#stage svg.draw-svg {
  position:absolute; top:0; left:0;
  width:100%; height:100%;
  overflow:visible;
}
#stage svg.draw-svg.inactive { pointer-events:none; }

#layersPanel {
  width:var(--layers-w);
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  transition:width .2s ease, opacity .2s ease;
  overflow:hidden;
}
#layersPanel.hidden { width:0; opacity:0; pointer-events:none; }

.layers-header {
  padding:10px 12px 8px;
  font-family:'DM Mono',monospace; font-size:11px; font-weight:500;
  color:var(--text-muted); letter-spacing:.08em;
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.add-layer-btn {
  width:22px; height:22px; border-radius:5px;
  border:1px solid var(--border); background:transparent;
  color:var(--text-muted); cursor:pointer; font-size:16px;
  display:flex; align-items:center; justify-content:center; line-height:1;
  transition:all .13s;
}
.add-layer-btn:hover { background:var(--panel); color:var(--accent); }

#layersList { flex:1; overflow-y:auto; padding:6px; display:flex; flex-direction:column; gap:4px; }
#layersList::-webkit-scrollbar { width:4px; }
#layersList::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }

.layer-item {
  display:flex; align-items:center; gap:7px;
  padding:7px 8px; border-radius:7px;
  border:1px solid transparent;
  cursor:pointer; transition:all .13s; flex-shrink:0;
}
.layer-item:hover { background:var(--panel); }
.layer-item.active { background:var(--panel); border-color:var(--border); }
.layer-item.active .layer-name { color:var(--accent); }

.vis-btn {
  width:18px; height:18px; flex-shrink:0;
  background:none; border:none; cursor:pointer;
  font-size:12px; color:var(--text-muted); opacity:0.7; transition:opacity .13s;
  display:flex; align-items:center; justify-content:center;
}
.vis-btn:hover { opacity:1; }
.vis-btn.hidden-lyr { opacity:0.25; }

.layer-thumb {
  width:34px; height:34px; border-radius:4px;
  border:1px solid var(--border); flex-shrink:0;
  background:repeating-conic-gradient(#333 0% 25%, #2a2a2a 0% 50%) 0 0 / 8px 8px;
  overflow:hidden; position:relative;
}
.layer-thumb svg, .layer-thumb img {
  position:absolute; top:0; left:0; width:100%; height:100%;
}

.layer-name {
  flex:1; font-size:12px; color:var(--text);
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

.del-btn {
  width:18px; height:18px; flex-shrink:0;
  background:none; border:none; cursor:pointer;
  font-size:11px; color:var(--text-muted); opacity:0;
  transition:opacity .13s;
}
.layer-item:hover .del-btn { opacity:0.5; }
.del-btn:hover { opacity:1 !important; color:var(--danger); }

#bottomBar {
  position:fixed; bottom:0; left:0; right:0;
  height:calc(var(--toolbar-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
  padding-left:14px; padding-right:14px;
  z-index:200; overflow-x:auto;
}
#bottomBar::-webkit-scrollbar { display:none; }

#toast {
  position:fixed;
  bottom:calc(var(--toolbar-h) + var(--safe-bottom) + 14px);
  left:50%; transform:translateX(-50%) translateY(12px);
  background:var(--panel); border:1px solid var(--border); border-radius:8px;
  padding:8px 16px; font-size:13px; color:var(--text);
  opacity:0; transition:all .25s; z-index:999; pointer-events:none; white-space:nowrap;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

#installBanner {
  position:fixed; top:calc(var(--toolbar-h) + var(--safe-top) + 10px); left:50%; transform:translateX(-50%);
  background:#162a1e; border:1px solid #2a5a3e; border-radius:10px;
  padding:10px 16px; font-size:12px; color:#7ecba5; max-width:320px; text-align:center;
  z-index:300; line-height:1.6;
}
#installBanner button { margin-top:6px; background:none; border:none; color:#7ecba5; font-size:11px; cursor:pointer; text-decoration:underline; }
</style>
</head>
<body>

<div id="toolbar">
  <span class="logo">P·DRAW</span>
  <div class="sep"></div>
  <div class="swatches">
    <div class="sw active" data-c="#f0ece6" style="background:#f0ece6"></div>
    <div class="sw" data-c="#c94a2a" style="background:#c94a2a"></div>
    <div class="sw" data-c="#5b9bd5" style="background:#5b9bd5"></div>
    <div class="sw" data-c="#5cb87a" style="background:#5cb87a"></div>
    <div class="sw" data-c="#e8c84b" style="background:#e8c84b"></div>
    <div class="sw" data-c="#c47ed4" style="background:#c47ed4"></div>
    <div class="sw" data-c="#e8a456" style="background:#e8a456"></div>
    <input type="color" id="cp" value="#f0ece6" title="Custom colour">
  </div>
  <div class="sep"></div>
  <div class="ctrl">
    <span class="ctrl-lbl">SIZE</span>
    <input type="range" id="sizeSlider" min="1" max="40" value="3" step="1">
    <span class="ctrl-lbl" id="sizeVal">3</span>
  </div>
  <div class="sep"></div>
  <button class="tbtn active" id="penBtn">Pen</button>
  <button class="tbtn" id="eraserBtn">Eraser</button>
  <button class="tbtn" id="undoBtn">Undo</button>
  <div class="sep"></div>
  <button class="tbtn active" id="layersToggle">Layers</button>
</div>

<div id="main">
  <div id="stage"></div>
  <div id="layersPanel">
    <div class="layers-header">
      <span>LAYERS</span>
      <button class="add-layer-btn" id="addLayerBtn">+</button>
    </div>
    <div id="layersList"></div>
  </div>
</div>

<div id="bottomBar">
  <button class="tbtn" id="addPhotoBtn">+ Photo</button>
  <button class="tbtn" id="addDrawBtn">+ Draw Layer</button>
  <div class="sep"></div>
  <button class="tbtn" id="exportVisBtn">Export Visible SVG</button>
  <button class="tbtn" id="exportAllBtn">Export All SVG</button>
</div>

<input type="file" id="photoInput" accept="image/*" style="display:none">
<div id="toast"></div>
<div id="installBanner" style="display:none">
  To install: tap <strong>Share</strong> in Safari &rarr; <strong>"Add to Home Screen"</strong>
  <br><button onclick="this.parentElement.style.display='none'">Dismiss</button>
</div>

<script>
(() => {
'use strict';

/* ── STATE ── */
let layers = [];
let activeId = null;
let color = '#f0ece6';
let strokeWidth = 3;
let mode = 'pen';
let drawing = false;
let pts = [];
let activePath = null;
let idCounter = 0;

const stage = document.getElementById('stage');

/* ── HELPERS ── */
const stageW = () => stage.offsetWidth;
const stageH = () => stage.offsetHeight;
const f = n => n.toFixed(2);

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ── ZOOM / PAN STATE ── */
let zoom = 1.0;
let panX = 0, panY = 0;
let pinchActive = false;
let pinchStartDist = 0, pinchStartZoom = 1;
let pinchStartPanX = 0, pinchStartPanY = 0;
let pinchMidX = 0, pinchMidY = 0;
const MIN_ZOOM = 0.25, MAX_ZOOM = 12;

// Wrapper div inside stage — all layers go here, we CSS-transform this
const viewport = document.createElement('div');
viewport.id = 'viewport';
viewport.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;transform-origin:0 0;will-change:transform;';
stage.appendChild(viewport);

function applyTransform() {
  viewport.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
}

/* ── SMOOTH PATH
   1. Douglas-Peucker simplification to remove near-collinear points
   2. Catmull-Rom spline → cubic bezier for silky curves
── */
function dpSimplify(pts, epsilon) {
  if (pts.length <= 2) return pts;
  let maxD = 0, idx = 0;
  const [p1, p2] = [pts[0], pts[pts.length-1]];
  const dx = p2.x-p1.x, dy = p2.y-p1.y;
  const len = Math.sqrt(dx*dx+dy*dy);
  for (let i = 1; i < pts.length-1; i++) {
    const d = len === 0
      ? Math.hypot(pts[i].x-p1.x, pts[i].y-p1.y)
      : Math.abs(dy*pts[i].x - dx*pts[i].y + p2.x*p1.y - p2.y*p1.x) / len;
    if (d > maxD) { maxD = d; idx = i; }
  }
  if (maxD > epsilon) {
    const l = dpSimplify(pts.slice(0, idx+1), epsilon);
    const r = dpSimplify(pts.slice(idx), epsilon);
    return [...l.slice(0,-1), ...r];
  }
  return [p1, p2];
}

function smoothPath(rawPts) {
  if (rawPts.length < 2) return '';
  // Simplify — epsilon in canvas px; lower = more detail
  const pts = dpSimplify(rawPts, 0.8);
  if (pts.length < 2) return '';
  if (pts.length === 2) {
    return `M ${f(pts[0].x)} ${f(pts[0].y)} L ${f(pts[1].x)} ${f(pts[1].y)}`;
  }
  // Catmull-Rom → cubic bezier, tension 0.5 for pen-like smoothness
  const T = 0.5;
  let d = `M ${f(pts[0].x)} ${f(pts[0].y)}`;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(i-1, 0)];
    const p1 = pts[i];
    const p2 = pts[i+1];
    const p3 = pts[Math.min(i+2, pts.length-1)];
    const c1x = p1.x + (p2.x - p0.x) * T / 2;
    const c1y = p1.y + (p2.y - p0.y) * T / 2;
    const c2x = p2.x - (p3.x - p1.x) * T / 2;
    const c2y = p2.y - (p3.y - p1.y) * T / 2;
    d += ` C ${f(c1x)} ${f(c1y)}, ${f(c2x)} ${f(c2y)}, ${f(p2.x)} ${f(p2.y)}`;
  }
  return d;
}

/* ── LAYER HELPERS ── */
const activeLayer = () => layers.find(l => l.id === activeId) || null;

function setActive(id) {
  activeId = id;
  layers.forEach(L => {
    if (L.type === 'draw') L.el.classList.toggle('inactive', L.id !== id);
  });
  renderLayersList();
}

function toggleVisible(id) {
  const L = layers.find(l => l.id === id);
  if (!L) return;
  L.visible = !L.visible;
  L.el.style.display = L.visible ? '' : 'none';
  renderLayersList();
}

function deleteLayer(id) {
  const idx = layers.findIndex(l => l.id === id);
  if (idx < 0) return;
  stage.removeChild(layers[idx].el);
  layers.splice(idx, 1);
  if (activeId === id) {
    const dl = layers.filter(l => l.type === 'draw');
    setActive(dl.length ? dl[dl.length-1].id : null);
  }
  renderLayersList();
}

/* ── ADD DRAW LAYER ── */
function addDrawLayer(name) {
  const id = ++idCounter;
  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('draw-svg');
  svg.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible;touch-action:none;';

  const bg = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  bg.setAttribute('width','100%'); bg.setAttribute('height','100%');
  bg.setAttribute('fill','transparent');
  svg.appendChild(bg);

  const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
  g.classList.add('strokes');
  svg.appendChild(g);

  viewport.appendChild(svg);

  const L = { id, type:'draw', name: name || `Draw ${id}`, visible:true, el:svg, paths:[], undoStack:[] };
  layers.push(L);
  setActive(id);
  renderLayersList();
  return L;
}

/* ── ADD PHOTO LAYER ── */
function addPhotoLayer(name, img) {
  const id = ++idCounter;
  const dpr = window.devicePixelRatio || 1;
  const w = stageW(), h = stageH();
  const canvas = document.createElement('canvas');
  canvas.classList.add('photo-canvas');
  canvas.style.cssText = `position:absolute;top:0;left:0;pointer-events:none;width:${w}px;height:${h}px;`;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  paintPhoto(ctx, img, w, h);

  // Insert before first draw SVG inside viewport so photo is underneath
  const firstDraw = viewport.querySelector('svg.draw-svg');
  viewport.insertBefore(canvas, firstDraw);

  const L = { id, type:'photo', name: name || `Photo ${id}`, visible:true, el:canvas, image:img };
  layers.unshift(L);
  renderLayersList();
  return L;
}

function paintPhoto(ctx, img, w, h) {
  ctx.clearRect(0, 0, w, h);
  const iw = img.naturalWidth, ih = img.naturalHeight;
  const scale = Math.min(w/iw, h/ih);
  const sw = iw*scale, sh = ih*scale;
  ctx.drawImage(img, (w-sw)/2, (h-sh)/2, sw, sh);
}

function resizePhotos() {
  const dpr = window.devicePixelRatio || 1;
  const w = stageW(), h = stageH();
  layers.filter(l => l.type === 'photo').forEach(L => {
    L.el.style.width = w+'px'; L.el.style.height = h+'px';
    L.el.width = w*dpr; L.el.height = h*dpr;
    const ctx = L.el.getContext('2d');
    ctx.scale(dpr, dpr);
    paintPhoto(ctx, L.image, w, h);
  });
}
window.addEventListener('resize', resizePhotos);

/* ── DRAWING & PINCH ZOOM ── */

// Convert screen position to canvas-space (accounting for zoom/pan)
function screenToCanvas(sx, sy) {
  const r = stage.getBoundingClientRect();
  return {
    x: (sx - r.left - panX) / zoom,
    y: (sy - r.top  - panY) / zoom
  };
}

function touchDist(t1, t2) {
  return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
}
function touchMid(t1, t2) {
  return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
}

// ── Pointer (Apple Pencil / mouse) ──
stage.addEventListener('pointerdown', e => {
  // Ignore if a pinch is active
  if (pinchActive) return;
  const L = activeLayer();
  if (!L || L.type !== 'draw' || !L.visible) return;
  e.preventDefault();
  drawing = true;
  pts = [screenToCanvas(e.clientX, e.clientY)];

  if (mode === 'eraser') { activePath = null; return; }

  L.undoStack.push(L.paths.length);
  if (L.undoStack.length > 50) L.undoStack.shift();

  const g = L.el.querySelector('g.strokes');
  activePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  activePath.setAttribute('fill', 'none');
  activePath.setAttribute('stroke', color);
  activePath.setAttribute('stroke-width', strokeWidth);
  activePath.setAttribute('stroke-linecap', 'round');
  activePath.setAttribute('stroke-linejoin', 'round');
  g.appendChild(activePath);
}, { passive: false });

stage.addEventListener('pointermove', e => {
  if (!drawing || pinchActive) return;
  e.preventDefault();
  const L = activeLayer();
  if (!L || L.type !== 'draw') return;
  const pos = screenToCanvas(e.clientX, e.clientY);

  if (mode === 'eraser') { eraseAt(L, pos); return; }

  pts.push(pos);
  // Update live path on every point — no skipping
  if (activePath) activePath.setAttribute('d', smoothPath(pts));
}, { passive: false });

stage.addEventListener('pointerup',     finishStroke);
stage.addEventListener('pointercancel', finishStroke);

function finishStroke() {
  if (!drawing) return;
  drawing = false;
  const L = activeLayer();
  if (mode === 'eraser' || !L) { activePath = null; pts = []; updateThumbs(); return; }
  if (activePath) {
    const d = smoothPath(pts.length === 1
      ? [pts[0], { x: pts[0].x + 0.1, y: pts[0].y }]
      : pts);
    activePath.setAttribute('d', d);
    L.paths.push({ d, hexColor: color, strokeWidth, el: activePath });
  }
  activePath = null; pts = [];
  updateThumbs();
}

function eraseAt(L, pos) {
  const g = L.el.querySelector('g.strokes');
  const r = 24 / zoom; // eraser radius in canvas-space
  const toRemove = L.paths.filter(p => {
    try {
      const bb = p.el.getBBox();
      const pad = p.strokeWidth / 2 + r;
      return pos.x >= bb.x-pad && pos.x <= bb.x+bb.width+pad &&
             pos.y >= bb.y-pad && pos.y <= bb.y+bb.height+pad;
    } catch(e) { return false; }
  });
  toRemove.forEach(p => {
    if (p.el.parentNode === g) g.removeChild(p.el);
    L.paths = L.paths.filter(x => x !== p);
  });
}
stage.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    // Cancel any in-progress drawing stroke
    if (drawing) { finishStroke(); }
    pinchActive = true;
    const [t1, t2] = [e.touches[0], e.touches[1]];
    pinchStartDist = touchDist(t1, t2);
    pinchStartZoom = zoom;
    pinchStartPanX = panX;
    pinchStartPanY = panY;
    const mid = touchMid(t1, t2);
    const r = stage.getBoundingClientRect();
    pinchMidX = mid.x - r.left;
    pinchMidY = mid.y - r.top;
    e.preventDefault();
    return;
  }
  if (e.touches.length === 1 && !pinchActive) {
    const L = activeLayer();
    if (!L || L.type !== 'draw' || !L.visible) return;
    e.preventDefault();
    drawing = true;
    const t = e.touches[0];
    pts = [screenToCanvas(t.clientX, t.clientY)];
    if (mode === 'eraser') { activePath = null; return; }
    L.undoStack.push(L.paths.length);
    if (L.undoStack.length > 50) L.undoStack.shift();
    const g = L.el.querySelector('g.strokes');
    activePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    activePath.setAttribute('fill', 'none');
    activePath.setAttribute('stroke', color);
    activePath.setAttribute('stroke-width', strokeWidth);
    activePath.setAttribute('stroke-linecap', 'round');
    activePath.setAttribute('stroke-linejoin', 'round');
    g.appendChild(activePath);
  }
}, { passive: false });

stage.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && pinchActive) {
    e.preventDefault();
    const [t1, t2] = [e.touches[0], e.touches[1]];
    const dist = touchDist(t1, t2);
    const scale = dist / pinchStartDist;
    const newZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, pinchStartZoom * scale));

    // Zoom toward the midpoint of the pinch
    panX = pinchMidX - (pinchMidX - pinchStartPanX) * (newZoom / pinchStartZoom);
    panY = pinchMidY - (pinchMidY - pinchStartPanY) * (newZoom / pinchStartZoom);
    zoom = newZoom;
    applyTransform();
    return;
  }
  if (e.touches.length === 1 && !pinchActive && drawing) {
    e.preventDefault();
    const L = activeLayer();
    if (!L || L.type !== 'draw') return;
    const t = e.touches[0];
    const pos = screenToCanvas(t.clientX, t.clientY);
    if (mode === 'eraser') { eraseAt(L, pos); return; }
    pts.push(pos);
    if (activePath) activePath.setAttribute('d', smoothPath(pts));
  }
}, { passive: false });

stage.addEventListener('touchend', e => {
  if (pinchActive && e.touches.length < 2) {
    pinchActive = false;
    return;
  }
  if (!pinchActive) finishStroke();
}, { passive: false });

stage.addEventListener('touchcancel', () => {
  pinchActive = false;
  finishStroke();
});

/* ── UNDO ── */
function undo() {
  const L = activeLayer();
  if (!L || L.type !== 'draw' || !L.undoStack.length) { toast('Nothing to undo'); return; }
  const target = L.undoStack.pop();
  const g = L.el.querySelector('g.strokes');
  while (L.paths.length > target) {
    const p = L.paths.pop();
    if (p.el.parentNode === g) g.removeChild(p.el);
  }
  updateThumbs();
}

/* ── THUMBNAILS ── */
function updateThumbs() {
  const sw = stageW(), sh = stageH();
  layers.forEach(L => {
    const thumb = document.querySelector(`.layer-thumb[data-id="${L.id}"]`);
    if (!thumb) return;
    thumb.innerHTML = '';
    if (L.type === 'draw') {
      const mini = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      mini.setAttribute('viewBox', `0 0 ${sw} ${sh}`);
      mini.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      mini.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;';
      L.paths.forEach(p => {
        const pp = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        pp.setAttribute('d', p.d);
        pp.setAttribute('fill', 'none');
        pp.setAttribute('stroke', p.hexColor || '#000000');
        pp.setAttribute('stroke-width', p.strokeWidth * 2);
        pp.setAttribute('stroke-linecap', 'round');
        mini.appendChild(pp);
      });
      thumb.appendChild(mini);
    } else {
      const img = document.createElement('img');
      img.src = L.image.src;
      img.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;';
      thumb.appendChild(img);
    }
  });
}

/* ── LAYERS LIST UI ── */
function renderLayersList() {
  const list = document.getElementById('layersList');
  list.innerHTML = '';
  [...layers].reverse().forEach(L => {
    const item = document.createElement('div');
    item.className = 'layer-item' + (L.id === activeId ? ' active' : '');

    const vb = document.createElement('button');
    vb.className = 'vis-btn' + (L.visible ? '' : ' hidden-lyr');
    vb.innerHTML = L.visible ? '&#128065;' : '&#9633;';
    vb.onclick = e => { e.stopPropagation(); toggleVisible(L.id); };

    const th = document.createElement('div');
    th.className = 'layer-thumb'; th.dataset.id = L.id;

    const nm = document.createElement('div');
    nm.className = 'layer-name';
    nm.textContent = (L.type === 'photo' ? '\uD83D\uDDBC\uFE0F ' : '\u270F\uFE0F ') + L.name;

    const db = document.createElement('button');
    db.className = 'del-btn'; db.textContent = '\u2715';
    db.onclick = e => { e.stopPropagation(); if (confirm(`Delete "${L.name}"?`)) deleteLayer(L.id); };

    item.appendChild(vb); item.appendChild(th); item.appendChild(nm); item.appendChild(db);
    if (L.type === 'draw') item.onclick = () => setActive(L.id);
    list.appendChild(item);
  });
  updateThumbs();
}

/* ── EXPORT SVG ── */
function exportSVG(visibleOnly) {
  const w = stageW(), h = stageH();
  const toLayers = visibleOnly ? layers.filter(l => l.visible) : layers;
  if (!toLayers.length) { toast('No layers to export'); return; }

  // Build SVG as a proper DOM so attributes are always valid
  const ns = 'http://www.w3.org/2000/svg';
  const xlns = 'http://www.w3.org/1999/xlink';
  const root = document.createElementNS(ns, 'svg');
  root.setAttribute('xmlns', ns);
  root.setAttribute('xmlns:xlink', xlns);
  root.setAttribute('width', w);
  root.setAttribute('height', h);
  root.setAttribute('viewBox', `0 0 ${w} ${h}`);

  // White background
  const bg = document.createElementNS(ns, 'rect');
  bg.setAttribute('width', w); bg.setAttribute('height', h);
  bg.setAttribute('fill', '#ffffff');
  root.appendChild(bg);

  for (const L of toLayers) {
    const g = document.createElementNS(ns, 'g');
    g.setAttribute('id', `layer_${L.id}_${L.name.replace(/[^a-zA-Z0-9]/g,'_')}`);
    g.setAttribute('inkscape:label', L.name); // Inkscape layer name
    g.setAttribute('inkscape:groupmode', 'layer');

    if (L.type === 'photo') {
      // Embed photo as base64 PNG
      const tmp = document.createElement('canvas');
      tmp.width = L.el.width; tmp.height = L.el.height;
      tmp.getContext('2d').drawImage(L.el, 0, 0);
      const img = document.createElementNS(ns, 'image');
      img.setAttribute('x', 0); img.setAttribute('y', 0);
      img.setAttribute('width', w); img.setAttribute('height', h);
      img.setAttributeNS(xlns, 'xlink:href', tmp.toDataURL('image/png'));
      g.appendChild(img);

    } else {
      // True vector paths — stroke as hex + stroke-opacity separately
      for (const p of L.paths) {
        if (!p.d) continue;
        const el = document.createElementNS(ns, 'path');
        el.setAttribute('d', p.d);
        el.setAttribute('fill', 'none');
        // stroke color must be hex for SVG compliance
        el.setAttribute('stroke', p.hexColor || '#000000');
        el.setAttribute('stroke-width', p.strokeWidth);
        el.setAttribute('stroke-linecap', 'round');
        el.setAttribute('stroke-linejoin', 'round');
        g.appendChild(el);
      }
    }
    root.appendChild(g);
  }

  // Serialize to string
  const serializer = new XMLSerializer();
  const svgStr = serializer.serializeToString(root);
  const blob = new Blob([svgStr], { type:'image/svg+xml;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = visibleOnly ? 'drawing-visible.svg' : 'drawing-all.svg';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast(visibleOnly ? 'Exported visible layers as SVG' : 'Exported all layers as SVG');
}

/* ── UI CONTROLS ── */
document.querySelectorAll('.sw').forEach(sw => {
  sw.addEventListener('click', () => {
    document.querySelectorAll('.sw').forEach(s => s.classList.remove('active'));
    sw.classList.add('active');
    color = sw.dataset.c;
  });
});
document.getElementById('cp').addEventListener('input', e => {
  color = e.target.value;
  document.querySelectorAll('.sw').forEach(s => s.classList.remove('active'));
});
document.getElementById('sizeSlider').addEventListener('input', e => {
  strokeWidth = +e.target.value;
  document.getElementById('sizeVal').textContent = strokeWidth;
});

document.getElementById('penBtn').addEventListener('click', () => {
  mode = 'pen';
  document.getElementById('penBtn').classList.add('active');
  document.getElementById('eraserBtn').classList.remove('active');
});
document.getElementById('eraserBtn').addEventListener('click', () => {
  mode = 'eraser';
  document.getElementById('eraserBtn').classList.add('active');
  document.getElementById('penBtn').classList.remove('active');
});
document.getElementById('undoBtn').addEventListener('click', undo);

document.getElementById('addLayerBtn').addEventListener('click', () => addDrawLayer());
document.getElementById('addDrawBtn').addEventListener('click', () => addDrawLayer());
document.getElementById('addPhotoBtn').addEventListener('click', () => document.getElementById('photoInput').click());
document.getElementById('exportVisBtn').addEventListener('click', () => exportSVG(true));
document.getElementById('exportAllBtn').addEventListener('click', () => exportSVG(false));

document.getElementById('layersToggle').addEventListener('click', () => {
  const panel = document.getElementById('layersPanel');
  const btn = document.getElementById('layersToggle');
  btn.classList.toggle('active', panel.classList.toggle('hidden'));
  // re-toggle: hidden means panel is gone, so active should be off
  btn.classList.toggle('active', !panel.classList.contains('hidden'));
});

document.getElementById('photoInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const img = new Image();
  img.onload = () => { addPhotoLayer(file.name.replace(/\.[^.]+$/,''), img); toast('Photo layer added'); };
  img.src = URL.createObjectURL(file);
  e.target.value = '';
});

/* ── PWA INSTALL HINT ── */
const standalone = window.navigator.standalone === true || window.matchMedia('(display-mode:standalone)').matches;
if (!standalone && /iPad|iPhone|iPod/.test(navigator.userAgent)) {
  const b = document.getElementById('installBanner');
  b.style.display = 'block';
  setTimeout(() => b.style.display = 'none', 9000);
}

/* ── INIT ── */
requestAnimationFrame(() => requestAnimationFrame(() => {
  addDrawLayer('Draw 1');
  toast('Ready · draw with Apple Pencil');
}));

})();
</script>
